name: Build Mini Globed Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Android32", abi: "armeabi-v7a", target_id: "android32" }
          - { name: "Android64", abi: "arm64-v8a", target_id: "android64" }

    name: Build ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean workspace
        run: rm -rf geode-sdk-clone build .sccache cpm-cache my-epic-geode-cli

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Setup Ninja
        run: sudo apt-get install -y ninja-build

      - name: Clone Geode SDK v4.6.0
        run: git clone https://github.com/geode-sdk/geode.git geode-sdk --branch v4.6.0 --depth 1 --recursive

      - name: Download binaries
        run: |
          cd geode-sdk
          mkdir -p bin/nightly
          curl -L "https://github.com/geode-sdk/geode/releases/download/v4.6.0/geode-v4.6.0-${{ matrix.config.target_id }}.zip" -o binaries.zip
          unzip -o binaries.zip -d bin/nightly/ || true
          find bin -type f | head -20
          echo "Done downloading binaries"

      - name: Install Geode CLI v3.4.0
        run: |
          curl -L "https://github.com/geode-sdk/cli/releases/download/v3.4.0/geode-cli-v3.4.0-linux.zip" -o cli.zip
          unzip cli.zip -d cli
          chmod +x cli/geode

      - name: Patch SDK to skip version check
        run: |
          echo "=== Before patch ==="
          grep -n "FATAL_ERROR.*made for Geode" geode-sdk/cmake/GeodeFile.cmake || echo "Pattern not found with FATAL_ERROR"
          grep -n "made for Geode version" geode-sdk/cmake/GeodeFile.cmake
          echo "=== Patching ==="
          sed -i '/made for Geode version/s/FATAL_ERROR/WARNING/' geode-sdk/cmake/GeodeFile.cmake
          sed -i '/made for Geode version/s/message(WARNING/message(STATUS/' geode-sdk/cmake/GeodeFile.cmake || true
          echo "=== After patch ==="
          grep -n "made for Geode version" geode-sdk/cmake/GeodeFile.cmake

      - name: Configure CMake
        run: |
          export PATH="$PWD/cli:$PATH"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -G Ninja
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk
      - name: List build output
        run: |
          echo "=== Build directory ==="
          find build -type f -name "*.so" -o -name "*.geode" -o -name "*.dll" 2>/dev/null
          echo "=== All files in build root ==="
          ls -la build/
          echo "=== Looking deeper ==="
          find build -maxdepth 3 -type f | grep -v CMakeFiles | head -30
      - name: Build
        run: |
          export PATH="$PWD/cli:$PATH"
          cmake --build build --config Release --verbose 2>&1 | tail -50
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk
      - name: Package
        run: |
          export PATH="$PWD/cli:$PATH"
          SO_FILE=$(find build -name "*.so" -type f | head -1)
          echo "Found SO: $SO_FILE"
          if [ -n "$SO_FILE" ]; then
            ./cli/geode package new . \
              --binary "$SO_FILE" \
              --output build/mini-globed.multiplayer.geode || true
          fi
          ls -la build/*.geode 2>/dev/null || echo "No .geode file created"
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.target_id }}
          path: |
            build/*.geode
            build/*.so
            build/**/*.so
  package:
    name: Package mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload final
        uses: actions/upload-artifact@v4
        with:
          name: mini-globed-android
          path: artifacts/**/*
name: Build Mini Globed Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Android32", abi: "armeabi-v7a", target_id: "android32" }
          - { name: "Android64", abi: "arm64-v8a", target_id: "android64" }

    name: Build ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Setup Ninja
        run: sudo apt-get install -y ninja-build

      - name: Clone Geode SDK v4.6.0
        run: git clone https://github.com/geode-sdk/geode.git geode-sdk --branch v4.6.0 --depth 1 --recursive

      - name: Install Geode CLI v3.4.0
        run: |
          curl -L "https://github.com/geode-sdk/cli/releases/download/v3.4.0/geode-cli-v3.4.0-linux.zip" -o cli.zip
          unzip cli.zip -d cli
          chmod +x cli/geode

      - name: Install binaries
        run: |
          ./cli/geode sdk set-path ${{ github.workspace }}/geode-sdk || true
          ./cli/geode config setup || true
          ./cli/geode sdk install-binaries --platform ${{ matrix.config.target_id }} || true
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Patch version check
        run: |
          sed -i 's/message(FATAL_ERROR "Mod ${MOD_ID} is made for Geode version/message(WARNING "Mod ${MOD_ID} is made for Geode version/' geode-sdk/cmake/GeodeFile.cmake

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -G Ninja
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Build
        run: cmake --build build --config Release
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Package
        run: |
          ./cli/geode package new . \
            --binary build/mini-globed.multiplayer.${{ matrix.config.target_id }}.so \
            --output build/mini-globed.multiplayer.geode || true
          ls -la build/*.geode build/*.so 2>/dev/null || echo "Listing build dir:"
          ls -la build/
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.target_id }}
          path: |
            build/*.geode
            build/*.so

  package:
    name: Package mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload final
        uses: actions/upload-artifact@v4
        with:
          name: mini-globed-android
          path: artifacts/**/*
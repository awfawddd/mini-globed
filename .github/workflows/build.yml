name: Build Mini Globed Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Android32", abi: "armeabi-v7a", target_id: "android32" }
          - { name: "Android64", abi: "arm64-v8a", target_id: "android64" }

    name: Build ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Install Geode CLI
        run: |
          curl -L "https://github.com/geode-sdk/cli/releases/download/v3.4.0/geode-cli-v3.4.0-linux.zip" -o cli.zip
          unzip cli.zip -d cli
          chmod +x cli/geode
          echo "$PWD/cli" >> $GITHUB_PATH

      - name: Install Geode SDK
        run: |
          geode sdk install --path ./geode-sdk
          cd geode-sdk
          git checkout v4.6.0
          geode sdk install-binaries --platform ${{ matrix.config.target_id }}
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Verify mod.json
        run: |
          echo "mod.json content:"
          cat mod.json
          echo "Geode SDK version:"
          cd geode-sdk && git describe --tags

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -G Ninja
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Build
        run: cmake --build build --config Release
        env:
          GEODE_SDK: ${{ github.workspace }}/geode-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.target_id }}
          path: build/*.geode

  package:
    name: Package mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Android32
        uses: actions/download-artifact@v4
        with:
          name: build-android32
          path: artifacts

      - name: Download Android64
        uses: actions/download-artifact@v4
        with:
          name: build-android64
          path: artifacts

      - name: Upload final
        uses: actions/upload-artifact@v4
        with:
          name: mini-globed-android
          path: artifacts/*.geode
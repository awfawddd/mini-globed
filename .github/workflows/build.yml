name: Build Mini Globed

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Android32", target: "Android32", os: ubuntu-latest }
          - { name: "Android64", target: "Android64", os: ubuntu-latest }

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Combine .geode files
        uses: geode-sdk/build-geode-mod/combine@main

      - name: Upload final .geode
        uses: actions/upload-artifact@v4
        with:
          name: mini-globed-final
          path: "*.geode"